<div class="content">
    <app-barratareas></app-barratareas>
    <div class="container-fluid">
    <section>
        <div class="example-button-row">
          <div class="example-flex-container">
            <button mat-icon-button color="primary" aria-label="Example icon button with a vertical three dot icon">
              <i class="material-icons">post_add</i>
            </button>
            <button mat-icon-button color="primary"   aria-label="Example icon button with a home icon"
            matTooltip="Editar registro"
            matTooltipHideDelay="100000">
              <i class="material-icons">edit_note</i>
            </button>
            <button mat-icon-button color="primary"  aria-label="Example icon button with a menu icon">
              <i class="material-icons">delete</i>
            </button>
            <button mat-icon-button color="primary"  aria-label="Example icon button with a heart icon">
              <i class="material-icons">search</i>
            </button>
            <button mat-icon-button color="primary" aria-label="Example icon button with a open in new tab icon">
              <i class="material-icons">file_upload</i>
            </button>

          </div>
        </div>
      </section>
      </div>
      <div class="row">
        <div class="col-lg-4 col-md-4 col-sm-4">
            <div class="card card-stats">
                <div class="card-header card-header-warning card-header-icon">
                    <div class="card-icon">
                        <i class="material-icons">attach_money</i>
                    </div>
                    <p class="card-category">Ingresos</p>
                    <h3 class="card-title">S/ {{ventaTotal}}
                        <small></small>
                    </h3>
                </div>
                <div class="card-footer">
                    <div class="stats">
                        <!--<i class="material-icons text-danger">warning</i>
                        <a href="javascript:void(0)">Get More Space...</a>-->
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4 col-md-4 col-sm-4">
            <div class="card card-stats">
                <div class="card-header card-header-success card-header-icon">
                    <div class="card-icon">
                        <i class="material-icons">attach_money</i>
                    </div>
                    <p class="card-category">Pendientes</p>
                    <h3 class="card-title">S/ {{montoPendiente}} </h3>
                </div>
                <div class="card-footer">
                    <div class="stats">
                       <!-- <i class="material-icons">date_range</i> Last 24 Hours-->
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4 col-md-4 col-sm-4">
            <div class="card card-stats">
                <div class="card-header card-header-danger card-header-icon">
                    <div class="card-icon">
                        <i class="material-icons">attach_money</i>
                    </div>
                    <p class="card-category">Gastos</p>
                    <h3 class="card-title">S/ {{montoCompras}} </h3>
                </div>
                <div class="card-footer">
                    <div class="stats">
                        <!--<i class="material-icons">local_offer</i> Tracked from Github-->
                    </div>
                </div>
            </div>
        </div>

    </div>
    </div>
